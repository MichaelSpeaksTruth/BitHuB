<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to BitHub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: normal;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }

        .container {
            display: flex;
            gap: 2rem;
        }

        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 250px;
            height: 100px;
            border: 2px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            transition: background-color 0.2s, color 0.2s;
        }

        .box:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <h1>Welcome to BitHub</h1>
    <p>Select your campus</p>
    <div class="container">
        <a href="bit-mesra/index.html" class="box">BIT MESRA</a>
        <a href="bit-jaipur/index.html" class="box">BIT JAIPUR</a>
    </div>
</body>
</html>
